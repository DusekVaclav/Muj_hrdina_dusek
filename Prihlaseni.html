<main>




<section class="kontakt">



<h1>Kontaktujte mě</h1>





<form class="form-container" action="#" method="post">





<div class="form-row">


<label for="jmeno">
Jméno
</label>


<input 
type="text"
id="jmeno"
name="jmeno"
placeholder="Zadejte jméno"
required>


</div>






<div class="form-row">


<label for="email">
Email
</label>


<input 

type="email"

id="email"

name="email"

placeholder="Zadejte email"

required>



</div>








<div class="form-row">


<label for="predmet">
Předmět
</label>


<input 

type="text"

id="predmet"

name="predmet"

placeholder="Předmět zprávy"

required>


</div>








<div class="form-row">


<label for="zprava">
Zpráva
</label>


<textarea

id="zprava"

name="zprava"

rows="6"

placeholder="Napište zprávu"

required></textarea>


</div>







<button type="submit">
Odeslat
</button>






</form>
